name: Crawl Congress -> OpenAI -> Typesense

on:
  workflow_dispatch:
    inputs:
      congresses:
        description: 'Comma-separated congress numbers (e.g., "119" or "119,118")'
        required: false
        default: "119"
        type: string

      limit_per_run:
        description: "How many bills to process (All = 0)"
        required: false
        default: "25"
        type: choice
        options:
          - "0"
          - "25"
          - "100"
          - "500"
          - "1000"

      index_mode:
        description: "Index mode"
        required: false
        default: "upsert_new_updated"
        type: choice
        options:
          - upsert_new_updated
          - upsert_new_updated_fix_tracking
          - reindex_all
          - update_status_only

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps (works with or without package.json)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            echo "package.json found."
            if [ -f package-lock.json ]; then
              echo "package-lock.json found -> npm ci"
              npm ci
            else
              echo "No lockfile -> npm install"
              npm install
            fi
          else
            echo "No package.json -> creating minimal package.json + installing deps"
            npm init -y
            npm install openai undici
          fi

      - name: Run crawler
        env:
          # Inputs
          CONGRESSES: ${{ inputs.congresses }}
          LIMIT_PER_RUN: ${{ inputs.limit_per_run }}
          INDEX_MODE: ${{ inputs.index_mode }}

          # Repo variables
          CONGRESS_API_BASE: ${{ vars.CONGRESS_API_BASE }}
          OPENAI_SUMMARY_MODEL: ${{ vars.OPENAI_SUMMARY_MODEL }}
          OPENAI_EMBED_MODEL: ${{ vars.OPENAI_EMBED_MODEL }}

          # Secrets
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TYPESENSE_API_KEY: ${{ secrets.TYPESENSE_API_KEY }}
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_PORT: ${{ secrets.TYPESENSE_PORT }}
          TYPESENSE_PROTOCOL: ${{ secrets.TYPESENSE_PROTOCOL }}
          TYPESENSE_COLLECTION: ${{ secrets.TYPESENSE_COLLECTION }}
          TYPESENSE_CHUNKS_COLLECTION: ${{ secrets.TYPESENSE_CHUNKS_COLLECTION }}

          # Tuning (optional)
          CONGRESS_PAGE_SIZE: "100"
          TYPESENSE_BATCH_SIZE: "10"
          CHUNK_BATCH_SIZE: "20"
        run: node scripts/crawl_congress.js

      - name: Commit updated state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add state/bills_state.json state/bills_failed.json || true

          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          git commit -m "Update bills_state.json"
          git push
