name: Crawl Congress -> Typesense (Bills + Chunks)

on:
  workflow_dispatch:
    inputs:
      run_size:
        description: "How many bills to process this run"
        type: choice
        required: true
        default: all
        options:
          - all
          - "25"
          - "100"
          - "500"
      reindex_all:
        description: "Re-index bills even if unchanged (checkbox)"
        type: boolean
        required: true
        default: false

  schedule:
    - cron: "17 6 * * *" # daily 06:17 UTC

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Resolve run size
        id: runsize
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SIZE="${{ inputs.run_size }}"
          else
            SIZE="all"
          fi

          if [ "$SIZE" = "all" ]; then
            echo "limit_per_run=0" >> $GITHUB_OUTPUT
          else
            echo "limit_per_run=$SIZE" >> $GITHUB_OUTPUT
          fi

      # Gate scheduled runs using your repo variable AUTO_CRAWL_ENABLED=true
      - name: Gate scheduled runs
        if: ${{ github.event_name == 'schedule' && vars.AUTO_CRAWL_ENABLED != 'true' }}
        run: |
          echo "Scheduled runs are disabled (vars.AUTO_CRAWL_ENABLED != true). Exiting."
          exit 0

      - name: Run crawler
        env:
          # Congress
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          CONGRESS_API_BASE: ${{ vars.CONGRESS_API_BASE }}
          CONGRESSES: "119"

          # OpenAI
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_SUMMARY_MODEL: ${{ vars.OPENAI_SUMMARY_MODEL }}
          OPENAI_EMBED_MODEL: ${{ vars.OPENAI_EMBED_MODEL }}

          # Typesense (ALL are secrets in your repo)
          TYPESENSE_API_KEY: ${{ secrets.TYPESENSE_API_KEY }}
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_PORT: ${{ secrets.TYPESENSE_PORT }}
          TYPESENSE_PROTOCOL: ${{ secrets.TYPESENSE_PROTOCOL }}
          TYPESENSE_COLLECTION: ${{ secrets.TYPESENSE_COLLECTION }}
          TYPESENSE_CHUNKS_COLLECTION: ${{ secrets.TYPESENSE_CHUNKS_COLLECTION }}

          # Run controls
          LIMIT_PER_RUN: ${{ steps.runsize.outputs.limit_per_run }}
          REINDEX_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.reindex_all || 'false' }}

          # Optional tuning (set these as repo vars later if you want)
          TYPESENSE_BATCH_SIZE: "10"
          CONGRESS_PAGE_SIZE: "100"
          CHUNK_BATCH_SIZE: "20"

        run: node scripts/crawl_congress.js

      - name: Commit state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/bills_state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "Update bills_state.json"
          git push
