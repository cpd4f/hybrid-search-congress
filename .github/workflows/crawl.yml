name: Crawl Congress -> Typesense (Bills + Chunks)

on:
  workflow_dispatch:
    inputs:
      run_size:
        description: "How many bills to process this run"
        type: choice
        required: true
        default: all
        options:
          - all
          - "25"
          - "100"
          - "500"
      reindex_all:
        description: "Re-index bills even if unchanged (checkbox)"
        type: boolean
        required: true
        default: false

  schedule:
    - cron: "17 6 * * *" # daily 06:17 UTC

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      # Decide LIMIT_PER_RUN from the workflow input.
      # For scheduled runs, default to "all".
      - name: Resolve run size
        id: runsize
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SIZE="${{ inputs.run_size }}"
          else
            SIZE="all"
          fi

          if [ "$SIZE" = "all" ]; then
            echo "limit_per_run=0" >> $GITHUB_OUTPUT
          else
            echo "limit_per_run=$SIZE" >> $GITHUB_OUTPUT
          fi

      # Gate scheduled runs with repo variable ENABLE_SCHEDULED_RUNS
      - name: Gate scheduled runs
        if: ${{ github.event_name == 'schedule' && vars.ENABLE_SCHEDULED_RUNS != 'true' }}
        run: |
          echo "Scheduled runs are disabled (vars.ENABLE_SCHEDULED_RUNS != true). Exiting."
          exit 0

      - name: Run crawler
        env:
          # Congress
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          CONGRESS_API_BASE: ${{ vars.CONGRESS_API_BASE }}
          CONGRESSES: ${{ vars.CONGRESSES }}

          # OpenAI
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_SUMMARY_MODEL: ${{ vars.OPENAI_SUMMARY_MODEL }}
          OPENAI_EMBED_MODEL: ${{ vars.OPENAI_EMBED_MODEL }}

          # Typesense (primary bills)
          TYPESENSE_API_KEY: ${{ secrets.TYPESENSE_API_KEY }}
          TYPESENSE_HOST: ${{ vars.TYPESENSE_HOST }}
          TYPESENSE_PORT: ${{ vars.TYPESENSE_PORT }}
          TYPESENSE_PROTOCOL: ${{ vars.TYPESENSE_PROTOCOL }}
          TYPESENSE_COLLECTION: ${{ vars.TYPESENSE_COLLECTION }}

          # Typesense (chunks)
          TYPESENSE_CHUNKS_COLLECTION: ${{ vars.TYPESENSE_CHUNKS_COLLECTION }}

          # Run controls
          LIMIT_PER_RUN: ${{ steps.runsize.outputs.limit_per_run }}

          # Checkbox -> "true"/"false"
          REINDEX_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.reindex_all || 'false' }}

          # Tuning
          TYPESENSE_BATCH_SIZE: ${{ vars.TYPESENSE_BATCH_SIZE }}
          CONGRESS_PAGE_SIZE: ${{ vars.CONGRESS_PAGE_SIZE }}
          CHUNK_BATCH_SIZE: ${{ vars.CHUNK_BATCH_SIZE }}

        run: node scripts/crawl_congress.js

      - name: Commit state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/bills_state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "Update bills_state.json"
          git push
