<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Bill Details • Congress Bill Search</title>
    <meta name="description" content="Detailed bill view with AI and official summaries plus related bills." />

    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/filters.css" />

    <script src="./js/app.js" defer></script>
    <script src="./js/markdown.js" defer></script>
    <script src="./js/bill.js" defer></script>

    <link rel="icon" href="./assets/favicon.ico" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="./index.html" aria-label="Home">
          <span class="brand__mark"></span>
          <span class="brand__text">Congress Bill Search</span>
        </a>

        <nav class="topbar__nav" aria-label="Primary">
          <a href="./index.html" class="topbar__link">Search</a>
          <a href="./committee.html" class="topbar__link">Committees</a>
        </nav>
      </div>
    </header>

    <main class="main">
      <section class="section">
        <div class="container">
          <div class="bill-layout">
            <div class="bill-main-col">
              <article class="panel bill-main" id="billHeader">
                <div class="panel__body">
                  <div class="loading-state"><span class="loading-spinner" aria-hidden="true"></span><span class="muted">Loading bill header…</span></div>
                </div>
              </article>

              <article class="panel bill-qa-panel" id="billQaCard">
                <div class="panel__head"><div class="panel__title">Ask a question about the bill</div></div>
                <div class="panel__body">
                  <form id="billQaForm" class="bill-qa__form">
                    <input id="billQaInput" class="bill-qa__input" type="text" autocomplete="off" placeholder="Ask about this bill…" />
                    <button type="submit" class="bill-qa__btn">Ask</button>
                  </form>
                  <div id="billQaMessages" class="bill-qa__messages" hidden></div>
                </div>
              </article>

              <article class="panel bill-main" id="billContent">
                <div class="panel__body">
                  <div class="loading-state"><span class="loading-spinner" aria-hidden="true"></span><span class="muted">Loading bill details…</span></div>
                </div>
              </article>

              <article class="panel bill-text" id="billFullText">
                <div class="panel__head">
                  <div class="panel__title">Bill text</div>
                </div>
                <div class="panel__body">
                  <div class="loading-state"><span class="loading-spinner" aria-hidden="true"></span><span class="muted">Loading bill text…</span></div>
                </div>
              </article>
            </div>

            <aside class="panel bill-rail">
              <div class="panel__head">
                <div class="panel__title">Related bills</div>
              </div>
              <div class="panel__body" id="relatedBills">
                <div class="loading-state loading-state--padded"><span class="loading-spinner" aria-hidden="true"></span><span class="muted">Loading related bills…</span></div>
              </div>
            </aside>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <div class="muted">Demo: Congress.gov → OpenAI → Typesense</div>
        <div class="footer__links">
          <a class="footer__link" href="./index.html">Search</a>
          <a class="footer__link" href="./committee.html">Committees</a>
          <a class="footer__link" href="https://colemanpdavis.com" target="_blank" rel="noopener noreferrer">colemanpdavis.com</a>
          <a class="footer__iconlink" href="https://www.linkedin.com/in/coleman-davis-2bab1128/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <svg class="footer__icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M6.94 8.5H3.56V20h3.38V8.5ZM5.25 3A1.97 1.97 0 1 0 5.3 6.94 1.97 1.97 0 0 0 5.25 3ZM20.44 13.3c0-3.44-1.83-5.03-4.27-5.03-1.97 0-2.85 1.09-3.34 1.85V8.5H9.45V20h3.38v-5.7c0-1.5.28-2.95 2.14-2.95 1.82 0 1.84 1.7 1.84 3.05V20h3.38v-6.7Z"/></svg>
          </a>
        </div>
      </div>
    </footer>

  </body>
</html>
